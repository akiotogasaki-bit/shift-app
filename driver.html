<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お江戸弁当 ドライバー報告</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root {
  --blue: #2471A3;
  --blue-dark: #1A5276;
  --blue-light: #D6EAF8;
  --ink: #1C1C1C;
  --ink-soft: #4A4A4A;
  --ink-mute: #9A9A9A;
  --cream: #F4F6F9;
  --white: #FFFFFF;
  --border: #D5D8DC;
  --green: #27AE60;
  --red: #C0392B;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── HEADER ── */
.app-header {
  background: var(--blue);
  color: var(--white);
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.header-title { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 11px; opacity: .75; margin-top: 2px; }
.header-user { font-size: 12px; opacity: .8; text-align: right; }

/* ── LOADING ── */
#screen-loading {
  align-items: center;
  justify-content: center;
  background: var(--blue);
}
.loading-logo { color: var(--white); text-align: center; }
.loading-logo h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
.loading-logo p { font-size: 13px; opacity: .7; margin-bottom: 40px; }
.loader {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,.3);
  border-top-color: var(--white);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LOCATION SELECT ── */
.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-mute);
  letter-spacing: .1em;
  padding: 16px 16px 8px;
}
.search-wrap {
  padding: 0 16px 12px;
}
.search-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  background: var(--white);
  color: var(--ink);
}
.search-input:focus { outline: none; border-color: var(--blue); }

.location-check-list {
  padding: 0 16px;
  flex: 1;
  overflow-y: auto;
  padding-bottom: 100px;
}
.location-check-item {
  display: flex;
  align-items: center;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .15s;
  gap: 12px;
}
.location-check-item.selected {
  border-color: var(--blue);
  background: var(--blue-light);
}
.location-check-item:active { transform: scale(.98); }
.check-box {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.location-check-item.selected .check-box {
  background: var(--blue);
  border-color: var(--blue);
  color: #FFF;
  font-size: 14px;
}
.location-check-name { font-size: 15px; font-weight: 500; flex: 1; }
.selected-count {
  font-size: 12px;
  color: var(--blue);
  font-weight: 700;
  padding: 0 16px 8px;
}

/* ── STICKY BOTTOM ── */
.sticky-bottom {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-bottom));
}
.btn-primary {
  display: block;
  width: 100%;
  padding: 16px;
  background: var(--blue);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-primary:active { opacity: .8; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-secondary {
  display: block;
  width: 100%;
  padding: 14px;
  background: transparent;
  color: var(--ink-soft);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
}

/* ── INPUT SCREEN ── */
.input-sections { padding: 12px 16px 120px; }
.location-section {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
}
.location-section-header {
  background: var(--blue);
  color: var(--white);
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.location-section-header .total-badge {
  background: rgba(255,255,255,.2);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}
.product-input-row {
  display: flex;
  align-items: center;
  padding: 11px 16px;
  border-bottom: 1px solid #F0EDE5;
}
.product-input-row:last-child { border-bottom: none; }
.product-input-label { font-size: 13px; flex: 1; color: var(--ink-soft); }
.product-input {
  width: 90px;
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  text-align: right;
  background: var(--cream);
  color: var(--ink);
  font-family: inherit;
}
.product-input:focus { outline: none; border-color: var(--blue); background: var(--white); }
.product-unit { font-size: 12px; color: var(--ink-mute); margin-left: 6px; width: 16px; }

/* ── COMPLETE ── */
#screen-complete {
  background: var(--blue);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}
.complete-icon { font-size: 64px; margin-bottom: 20px; }
.complete-title { font-size: 24px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
.complete-sub { font-size: 14px; color: rgba(255,255,255,.75); margin-bottom: 32px; line-height: 1.6; }
.complete-summary {
  background: rgba(255,255,255,.15);
  border-radius: 12px;
  padding: 16px 20px;
  width: 100%;
  max-width: 320px;
  text-align: left;
}
.complete-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,.15);
  font-size: 13px;
  color: rgba(255,255,255,.85);
}
.complete-row:last-child { border-bottom: none; }
.complete-row span:last-child { font-weight: 700; color: var(--white); }
.btn-restart {
  margin-top: 24px;
  padding: 14px 32px;
  background: rgba(255,255,255,.2);
  color: #FFF;
  border: 1px solid rgba(255,255,255,.4);
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #333;
  color: #FFF;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="loading-logo">
    <h1>🚚 ドライバー報告</h1>
    <p>お江戸弁当 残数入力システム</p>
    <div class="loader"></div>
  </div>
</div>

<!-- LOCATION SELECT -->
<div id="screen-location" class="screen">
  <div class="app-header">
    <div>
      <div class="header-title">🚚 ドライバー報告</div>
      <div class="header-sub">回収した拠点を選択</div>
    </div>
    <div class="header-user" id="driver-name">--</div>
  </div>
  <div class="section-label">回収拠点（複数選択可）</div>
  <div class="search-wrap">
    <input type="text" class="search-input" id="location-search" placeholder="拠点名で絞り込み..." oninput="filterLocations()">
  </div>
  <div class="selected-count" id="selected-count">0拠点選択中</div>
  <div class="location-check-list" id="location-check-list"></div>
  <div class="sticky-bottom">
    <button class="btn-primary" id="btn-to-input" onclick="goToInput()" disabled>残数を入力する →</button>
  </div>
</div>

<!-- INPUT -->
<div id="screen-input" class="screen">
  <div class="app-header">
    <div>
      <div class="header-title">残数入力</div>
      <div class="header-sub" id="input-sub">0拠点</div>
    </div>
    <div class="header-user" id="input-driver-name">--</div>
  </div>
  <div class="input-sections" id="input-sections"></div>
  <div class="sticky-bottom">
    <button class="btn-primary" onclick="submitResidual()">報告を送信する</button>
    <button class="btn-secondary" onclick="showScreen('location')">← 拠点選択に戻る</button>
  </div>
</div>

<!-- COMPLETE -->
<div id="screen-complete" class="screen">
  <div class="complete-icon">✅</div>
  <div class="complete-title">報告完了</div>
  <div class="complete-sub">残数の報告が送信されました。<br>お疲れ様でした！</div>
  <div class="complete-summary" id="complete-summary"></div>
  <button class="btn-restart" onclick="restart()">続けて報告する</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxkcAI-Nkl3aoUZKgluss5AawPDc7aluPokONkYz6f2ikwl0S487JvhKdKh6QSp1xhEhA/exec';

const state = {
  userId: '',
  userName: '',
  locations: [],
  products: [],
  selectedIds: new Set(),
};

// ─────────────────────────────────────
// INIT
// ─────────────────────────────────────
async function init() {
  try {
    await liff.init({ liffId: '2009637457-eprpSUWd' });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile    = await liff.getProfile();
    state.userId     = profile.userId;
    state.userName   = profile.displayName;

    const res = await fetch(`${GAS_URL}?action=getMaster`, { redirect: 'follow' });
    const data = JSON.parse(await res.text());
    state.locations = data.locations || [];
    state.products  = data.products  || [];

    document.getElementById('driver-name').textContent      = state.userName;
    document.getElementById('input-driver-name').textContent = state.userName;

    renderLocationList();
    showScreen('location');
  } catch (e) {
    document.getElementById('screen-loading').innerHTML =
      `<div style="color:#fff;padding:40px;font-size:13px;word-break:break-all;">
        <p style="font-size:18px;margin-bottom:16px;">⚠️ エラー</p>
        <p>${e.message}</p>
      </div>`;
  }
}

// ─────────────────────────────────────
// LOCATION SELECT
// ─────────────────────────────────────
function renderLocationList(filter = '') {
  const list = document.getElementById('location-check-list');
  const filtered = state.locations.filter(l =>
    !filter || l.name.includes(filter)
  );

  list.innerHTML = filtered.map(loc => `
    <div class="location-check-item ${state.selectedIds.has(loc.id) ? 'selected' : ''}"
         onclick="toggleLocation('${loc.id}')">
      <div class="check-box">${state.selectedIds.has(loc.id) ? '✓' : ''}</div>
      <span class="location-check-name">${loc.name}</span>
    </div>
  `).join('');

  updateSelectedCount();
}

function toggleLocation(id) {
  if (state.selectedIds.has(id)) {
    state.selectedIds.delete(id);
  } else {
    state.selectedIds.add(id);
  }
  renderLocationList(document.getElementById('location-search').value);
}

function updateSelectedCount() {
  const count = state.selectedIds.size;
  document.getElementById('selected-count').textContent = `${count}拠点選択中`;
  document.getElementById('btn-to-input').disabled = count === 0;
}

function filterLocations() {
  const q = document.getElementById('location-search').value;
  renderLocationList(q);
}

// ─────────────────────────────────────
// INPUT SCREEN
// ─────────────────────────────────────
function goToInput() {
  const selected = state.locations.filter(l => state.selectedIds.has(l.id));
  document.getElementById('input-sub').textContent = `${selected.length}拠点の残数を入力`;

  document.getElementById('input-sections').innerHTML = selected.map(loc => `
    <div class="location-section">
      <div class="location-section-header">
        <span>${loc.name}</span>
        <span class="total-badge" id="total-${loc.id}">合計 0個</span>
      </div>
      ${state.products.map(p => `
        <div class="product-input-row">
          <span class="product-input-label">${p.name}</span>
          <input type="number" class="product-input"
            id="residual-${loc.id}-${p.id}"
            value="0" min="0" inputmode="numeric"
            oninput="updateTotal('${loc.id}')">
          <span class="product-unit">個</span>
        </div>
      `).join('')}
    </div>
  `).join('');

  // 初期合計を計算
  selected.forEach(loc => updateTotal(loc.id));
  showScreen('input');
}

function updateTotal(locationId) {
  const total = state.products.reduce((sum, p) => {
    const val = parseInt(document.getElementById(`residual-${locationId}-${p.id}`)?.value) || 0;
    return sum + val;
  }, 0);
  const badge = document.getElementById(`total-${locationId}`);
  if (badge) badge.textContent = `合計 ${total}個`;
}

// ─────────────────────────────────────
// SUBMIT
// ─────────────────────────────────────
async function submitResidual() {
  const selected = state.locations.filter(l => state.selectedIds.has(l.id));
  const reports  = selected.map(loc => {
    const residualCount = {};
    state.products.forEach(p => {
      residualCount[p.id] = parseInt(document.getElementById(`residual-${loc.id}-${p.id}`)?.value) || 0;
    });
    const total = Object.values(residualCount).reduce((s, v) => s + v, 0);
    return {
      locationId:     loc.id,
      locationName:   loc.name,
      residualCount,
      totalResidual:  total,
    };
  });

  const payload = {
    action:    'submitResidual',
    userId:    state.userId,
    userName:  state.userName,
    date:      new Date().toLocaleDateString('ja-JP'),
    reports,
  };

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
    });
  } catch (e) {
    console.error(e);
  }

  // 完了画面
  document.getElementById('complete-summary').innerHTML = reports.map(r => `
    <div class="complete-row">
      <span>${r.locationName}</span>
      <span>残 ${r.totalResidual}個</span>
    </div>
  `).join('');

  showScreen('complete');
}

// ─────────────────────────────────────
// UTILS
// ─────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function restart() {
  state.selectedIds.clear();
  document.getElementById('location-search').value = '';
  renderLocationList();
  showScreen('location');
}

// ─────────────────────────────────────
// BOOT
// ─────────────────────────────────────
init();
</script>
</body>
</html>
