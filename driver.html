<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お江戸弁当 ドライバー報告</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root {
  --blue: #2471A3;
  --blue-light: #D6EAF8;
  --ink: #1C1C1C;
  --ink-soft: #4A4A4A;
  --ink-mute: #9A9A9A;
  --cream: #F4F6F9;
  --white: #FFFFFF;
  --border: #D5D8DC;
  --green: #27AE60;
  --green-light: #D5F5E3;
  --red: #C0392B;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* HEADER */
.app-header {
  background: var(--blue);
  color: #FFF;
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.header-title { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 11px; opacity: .75; margin-top: 2px; }
.header-user { font-size: 12px; opacity: .8; }

/* LOADING */
#screen-loading { align-items: center; justify-content: center; background: var(--blue); }
.loading-logo { color: #FFF; text-align: center; }
.loading-logo h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
.loading-logo p { font-size: 13px; opacity: .7; margin-bottom: 40px; }
.loader {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,.3);
  border-top-color: #FFF;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* TABS */
.tab-bar {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 56px;
  z-index: 99;
}
.tab-btn {
  flex: 1;
  padding: 12px 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-mute);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  font-family: inherit;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }
.tab-badge {
  background: var(--green);
  color: #FFF;
  font-size: 11px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}
.tab-badge.red { background: var(--red); }

/* TAB PANELS */
.tab-panel { display: none; padding-bottom: 100px; }
.tab-panel.active { display: block; }

/* SECTION LABEL */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  padding: 14px 16px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label.uncollected { color: var(--red); }
.section-label.collected { color: var(--green); }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* LOCATION ITEMS */
.list-wrap { padding: 0 16px; }
.location-item {
  display: flex;
  align-items: center;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all .15s;
  gap: 12px;
}
.location-item:active { transform: scale(.98); }
.location-item.collected { border-color: var(--green); background: var(--green-light); opacity: .75; }
.check-circle {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
  transition: all .15s;
}
.location-item.collected .check-circle { background: var(--green); border-color: var(--green); color: #FFF; }
.location-name { font-size: 15px; font-weight: 500; flex: 1; }
.location-item.collected .location-name { color: var(--ink-mute); text-decoration: line-through; }
.location-tap-hint { font-size: 11px; color: var(--ink-mute); }

/* RESIDUAL */
.residual-summary {
  background: var(--blue);
  color: #FFF;
  margin: 12px 16px;
  border-radius: 14px;
  padding: 18px 20px;
  text-align: center;
}
.residual-summary-label { font-size: 12px; opacity: .7; letter-spacing: .1em; margin-bottom: 6px; }
.residual-summary-count { font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.residual-summary-unit { font-size: 16px; opacity: .8; }

.product-list { padding: 0 16px; }
.product-input-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.product-input-card.tea { opacity: .65; background: #FAFAFA; }
.product-input-name { font-size: 14px; flex: 1; color: var(--ink-soft); }
.product-input-field {
  width: 80px;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 16px;
  text-align: right;
  background: var(--cream);
  color: var(--ink);
  font-family: inherit;
}
.product-input-field:focus { outline: none; border-color: var(--blue); background: var(--white); }
.product-input-unit { font-size: 12px; color: var(--ink-mute); width: 16px; }

/* STICKY BOTTOM */
.sticky-bottom {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-bottom));
  z-index: 100;
}
.btn-primary {
  display: block;
  width: 100%;
  padding: 15px;
  background: var(--blue);
  color: #FFF;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-primary:active { opacity: .8; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; }

/* COMPLETE */
#screen-complete {
  background: var(--blue);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}
.complete-icon { font-size: 64px; margin-bottom: 20px; }
.complete-title { font-size: 24px; font-weight: 700; color: #FFF; margin-bottom: 8px; }
.complete-sub { font-size: 14px; color: rgba(255,255,255,.75); margin-bottom: 24px; line-height: 1.6; }
.complete-card {
  background: rgba(255,255,255,.15);
  border-radius: 12px;
  padding: 14px 20px;
  width: 100%;
  max-width: 320px;
  text-align: left;
  margin-bottom: 10px;
}
.complete-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,.15);
  font-size: 13px;
  color: rgba(255,255,255,.85);
}
.complete-row:last-child { border-bottom: none; }
.complete-row span:last-child { font-weight: 700; color: #FFF; }
.btn-restart {
  margin-top: 20px;
  padding: 12px 28px;
  background: rgba(255,255,255,.2);
  color: #FFF;
  border: 1px solid rgba(255,255,255,.4);
  border-radius: 12px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}

/* ── BREAKDOWN MODAL ── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--white);
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  border-radius: 16px 16px 0 0;
  padding: 20px 16px calc(20px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform .25s cubic-bezier(.32,0,.15,1);
  max-height: 70vh;
  overflow-y: auto;
}
.modal-bg.show .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 14px;
  text-align: center;
}
.breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #F0EDE5;
  font-size: 14px;
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-name { color: var(--ink-soft); }
.breakdown-val { font-weight: 700; color: var(--blue); }
.breakdown-zero { color: var(--ink-mute); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="loading-logo">
    <h1>🚚 ドライバー報告</h1>
    <p>お江戸弁当 回収・残数入力</p>
    <div class="loader"></div>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="app-header">
    <div>
      <div class="header-title">🚚 ドライバー報告</div>
      <div class="header-sub" id="main-date">--</div>
    </div>
    <div class="header-user" id="driver-name">--</div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-collection" onclick="switchTab('collection')">
      🚚 回収チェック
      <span class="tab-badge red" id="uncollected-badge">--</span>
    </button>
    <button class="tab-btn" id="tab-btn-residual" onclick="switchTab('residual')">
      📦 残数入力
    </button>
  </div>

  <!-- 回収チェック -->
  <div id="tab-collection" class="tab-panel active">
    <div id="collection-list"></div>
  </div>

  <!-- 残数入力 -->
  <div id="tab-residual" class="tab-panel">
    <!-- 全ドライバー累積合計 -->
    <div id="all-residual-box" style="background:#1A3C5E;border-radius:14px;padding:14px 16px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="color:rgba(255,255,255,.7);font-size:11px;">全ドライバー残数合計</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="color:rgba(255,255,255,.5);font-size:10px;" id="residual-updated-at">--:--更新</div>
          <button onclick="loadResidualSummary()" style="background:rgba(255,255,255,.2);border:none;color:#FFF;font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;font-family:inherit;">🔄 更新</button>
        </div>
      </div>
      <div onclick="openAllBreakdown()" style="cursor:pointer;text-align:center;padding:10px 0;background:rgba(255,255,255,.15);border-radius:10px;margin-bottom:10px;border:1px solid rgba(255,255,255,.3);">
        <span style="color:#FFD700;font-size:44px;font-weight:700;text-shadow:0 0 20px rgba(255,215,0,.5);" id="all-residual-total">—</span>
        <span style="color:#FFD700;font-size:16px;font-weight:700;">個</span>
        <div style="color:rgba(255,255,255,.6);font-size:10px;margin-top:2px;">タップで種別内訳</div>
      </div>
      <div id="driver-list" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>

    <!-- 自分の残数入力 -->
    <div class="residual-summary" onclick="openBreakdown()" style="cursor:pointer;">
      <div class="residual-summary-label">自分の残数入力合計（お茶除く）</div>
      <div class="residual-summary-count" id="residual-total">0</div>
      <div class="residual-summary-unit">個</div>
      <div style="font-size:11px;opacity:.6;margin-top:6px;">タップで内訳を確認</div>
    </div>
    <div class="product-list" id="product-list"></div>
  </div>

  <!-- STICKY BOTTOM -->
  <div class="sticky-bottom" id="sticky-collection">
    <button class="btn-primary" onclick="switchTab('residual')">
      📦 残数入力へ切り替え
    </button>
  </div>
  <div class="sticky-bottom" id="sticky-residual" style="display:none;">
    <button class="btn-primary" onclick="submitReport()">報告を送信する</button>
  </div>
</div>

<!-- COMPLETE -->
<div id="screen-complete" class="screen">
  <div class="complete-icon">✅</div>
  <div class="complete-title">報告完了</div>
  <div class="complete-sub">残数の報告が送信されました。<br>お疲れ様でした！</div>
  <div id="complete-residual-card" class="complete-card"></div>
  <div id="complete-collection-card" class="complete-card"></div>
  <button class="btn-restart" onclick="restart()">続けて報告する</button>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxkcAI-Nkl3aoUZKgluss5AawPDc7aluPokONkYz6f2ikwl0S487JvhKdKh6QSp1xhEhA/exec';

const state = {
  userId: '',
  userName: '',
  locations: [],
  products: [],
  collectedIds: new Set(),
};

async function init() {
  try {
    await liff.init({ liffId: '2009637457-eprpSUWd' });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    state.userId   = profile.userId;
    state.userName = profile.displayName;
    const res  = await fetch(`${GAS_URL}?action=getMaster`, { redirect: 'follow' });
    const data = JSON.parse(await res.text());
    state.locations = data.locations || [];
    state.products  = data.products  || [];

    const now = new Date();
    document.getElementById('driver-name').textContent = state.userName;
    document.getElementById('main-date').textContent =
      `${now.getMonth()+1}/${now.getDate()}（${['日','月','火','水','木','金','土'][now.getDay()]}）`;

    renderCollectionList();
    renderProductList();
    showScreen('main');
  } catch (e) {
    document.getElementById('screen-loading').innerHTML =
      `<div style="color:#fff;padding:40px;font-size:13px;word-break:break-all;">
        <p style="font-size:18px;margin-bottom:16px;">⚠️ エラー</p><p>${e.message}</p>
      </div>`;
  }
}

// ── 回収チェック ──
function renderCollectionList() {
  const uncollected = state.locations.filter(l => !state.collectedIds.has(l.id));
  const collected   = state.locations.filter(l =>  state.collectedIds.has(l.id));

  let html = '';
  html += `<div class="section-label uncollected">未回収 <span style="background:var(--red);color:#FFF;font-size:11px;font-weight:700;padding:1px 8px;border-radius:10px;">${uncollected.length}</span></div>`;
  html += '<div class="list-wrap">';
  if (uncollected.length === 0) {
    html += `<p style="text-align:center;color:var(--ink-mute);font-size:13px;padding:20px;">全拠点の回収が完了しました ✓</p>`;
  } else {
    html += uncollected.map(loc => `
      <div class="location-item" onclick="toggleCollection('${loc.id}')">
        <div class="check-circle"></div>
        <span class="location-name">${loc.name}</span>
        <span class="location-tap-hint">タップで回収済みに</span>
      </div>`).join('');
  }
  html += '</div>';

  if (collected.length > 0) {
    html += `<div class="section-label collected" style="margin-top:4px;">回収済み <span style="background:var(--green);color:#FFF;font-size:11px;font-weight:700;padding:1px 8px;border-radius:10px;">${collected.length}</span></div>`;
    html += '<div class="list-wrap">';
    html += collected.map(loc => `
      <div class="location-item collected" onclick="toggleCollection('${loc.id}')">
        <div class="check-circle">✓</div>
        <span class="location-name">${loc.name}</span>
        <span class="location-tap-hint">タップで解除</span>
      </div>`).join('');
    html += '</div>';
  }

  document.getElementById('collection-list').innerHTML = html;
  document.getElementById('uncollected-badge').textContent = uncollected.length;
  document.getElementById('uncollected-badge').className =
    `tab-badge ${uncollected.length > 0 ? 'red' : ''}`;
}

function toggleCollection(id) {
  if (state.collectedIds.has(id)) {
    state.collectedIds.delete(id);
  } else {
    state.collectedIds.add(id);
  }
  renderCollectionList();
}

// ── 残数入力 ──
function renderProductList() {
  const teaIds = state.products.filter(p => p.name.includes('お茶')).map(p => p.id);
  document.getElementById('product-list').innerHTML = state.products.map(p => {
    const isTea = teaIds.includes(p.id);
    return `
      <div class="product-input-card ${isTea ? 'tea' : ''}">
        <span class="product-input-name">${p.name}${isTea ? '&nbsp;<small style="color:var(--ink-mute);font-size:11px;">合計に含まれません</small>' : ''}</span>
        <input type="number" class="product-input-field" id="res-${p.id}" value="" placeholder="0" min="0" inputmode="numeric" oninput="updateResidualTotal()">
        <span class="product-input-unit">個</span>
      </div>`;
  }).join('');
}

function updateResidualTotal() {
  const teaIds = state.products.filter(p => p.name.includes('お茶')).map(p => p.id);
  const total  = state.products
    .filter(p => !teaIds.includes(p.id))
    .reduce((sum, p) => sum + (parseInt(document.getElementById(`res-${p.id}`)?.value || '0') || 0), 0);
  document.getElementById('residual-total').textContent = total;
}

// ── タブ切り替え ──
let residualSummaryTimer = null;

async function loadResidualSummary() {
  try {
    const res  = await fetch(GAS_URL + '?action=getResidualSummary', { redirect: 'follow' });
    const data = JSON.parse(await res.text());
    document.getElementById('all-residual-total').textContent = data.total || 0;
    const driverList = document.getElementById('driver-list');
    if (data.drivers && data.drivers.length > 0) {
      driverList.innerHTML = data.drivers.map(d => {
        const logs = d.logs.map(l => l.time + ' +' + l.count).join(' / ');
        return '<div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.08);border-radius:8px;padding:7px 10px;margin-bottom:4px;">'
          + '<div><div style="color:#FFF;font-size:13px;font-weight:600;">' + d.name + '</div>'
          + '<div style="color:rgba(255,255,255,.5);font-size:10px;margin-top:1px;">' + logs + '</div></div>'
          + '<div style="color:#FFD700;font-size:16px;font-weight:700;">' + d.total + '個</div></div>';
      }).join('');
    } else {
      driverList.innerHTML = '<div style="color:rgba(255,255,255,.4);font-size:12px;text-align:center;padding:8px 0;">まだ報告がありません</div>';
    }
    const now = new Date();
    document.getElementById('residual-updated-at').textContent =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + '更新';
    window._allResidualProducts = data.products || [];
  } catch(e) { console.warn('loadResidualSummary error:', e); }
}

function openAllBreakdown() {
  const products = window._allResidualProducts || [];
  const list = document.getElementById('all-breakdown-list');
  list.innerHTML = products.length === 0
    ? '<p style="color:#999;font-size:13px;text-align:center;padding:20px 0;">データがありません</p>'
    : products.map(p =>
        '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F0EDE5;font-size:14px;">'
        + '<span style="color:#4A4A4A;">' + p.productName + '</span>'
        + '<span style="font-weight:700;color:#1A3C5E;">' + p.qty + '個</span></div>'
      ).join('');
  document.getElementById('all-breakdown-modal').style.display = 'flex';
}

function closeAllBreakdown() {
  document.getElementById('all-breakdown-modal').style.display = 'none';
}

function startResidualSummaryTimer() {
  loadResidualSummary();
  if (residualSummaryTimer) clearInterval(residualSummaryTimer);
  residualSummaryTimer = setInterval(loadResidualSummary, 30000);
}

function stopResidualSummaryTimer() {
  if (residualSummaryTimer) { clearInterval(residualSummaryTimer); residualSummaryTimer = null; }
}

function switchTab(tab) {
  if (tab === 'residual') startResidualSummaryTimer();
  else stopResidualSummaryTimer();
  if (tab === 'residual') startResidualSummaryTimer();
  else stopResidualSummaryTimer();
  document.getElementById('tab-collection').classList.toggle('active', tab === 'collection');
  document.getElementById('tab-residual').classList.toggle('active', tab === 'residual');
  document.getElementById('tab-btn-collection').classList.toggle('active', tab === 'collection');
  document.getElementById('tab-btn-residual').classList.toggle('active', tab === 'residual');
  document.getElementById('sticky-collection').style.display = tab === 'collection' ? 'block' : 'none';
  document.getElementById('sticky-residual').style.display   = tab === 'residual'   ? 'block' : 'none';
  window.scrollTo(0, 0);
}

// ── 送信 ──
async function submitReport() {
  const residualCount = {};
  state.products.forEach(p => {
    residualCount[p.id] = parseInt(document.getElementById(`res-${p.id}`)?.value) || 0;
  });
  const teaIds     = state.products.filter(p => p.name.includes('お茶')).map(p => p.id);
  const totalNoTea = state.products
    .filter(p => !teaIds.includes(p.id))
    .reduce((s, p) => s + (residualCount[p.id] || 0), 0);
  const collectedLocations = state.locations.filter(l => state.collectedIds.has(l.id));

  const payload = {
    action:         'submitResidual',
    userId:         state.userId,
    userName:       state.userName,
    date:           new Date().toLocaleDateString('ja-JP'),
    collectedIds:   [...state.collectedIds],
    collectedNames: collectedLocations.map(l => l.name),
    residualCount,
    totalResidual:  totalNoTea,
  };
  try {
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
  } catch (e) { console.error(e); }

  document.getElementById('complete-residual-card').innerHTML = `
    <div class="complete-row" style="border-bottom:1px solid rgba(255,255,255,.3);margin-bottom:4px;padding-bottom:8px;">
      <span style="font-weight:700;color:#fff;">残数合計（お茶除く）</span>
      <span style="font-size:20px;">${totalNoTea}個</span>
    </div>
    ${state.products.map(p => {
      const val = residualCount[p.id] || 0;
      if (val === 0) return '';
      return `<div class="complete-row"><span>${p.name}</span><span>${val}個</span></div>`;
    }).join('')}`;

  document.getElementById('complete-collection-card').innerHTML = `
    <div class="complete-row" style="border-bottom:1px solid rgba(255,255,255,.3);margin-bottom:4px;padding-bottom:8px;">
      <span style="font-weight:700;color:#fff;">回収拠点</span>
      <span>${collectedLocations.length}拠点</span>
    </div>
    ${collectedLocations.map(l => `
      <div class="complete-row"><span>${l.name}</span><span>✓</span></div>`).join('')}`;

  showScreen('complete');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo(0, 0);
}

function restart() {
  state.collectedIds.clear();
  state.products.forEach(p => {
    const el = document.getElementById(`res-${p.id}`);
    if (el) el.value = 0;
  });
  updateResidualTotal();
  renderCollectionList();
  switchTab('collection');
  showScreen('main');
}

// ── 内訳モーダル ──
function openBreakdown() {
  const teaIds = state.products.filter(p => p.name.includes('お茶')).map(p => p.id);
  const rows = state.products.map(p => {
    const val    = parseInt(document.getElementById(`res-${p.id}`)?.value) || 0;
    const isTea  = teaIds.includes(p.id);
    return { name: p.name, val, isTea };
  });

  document.getElementById('breakdown-list').innerHTML = rows.map(r => `
    <div class="breakdown-row">
      <span class="breakdown-name">${r.name}${r.isTea ? ' <small style="color:var(--ink-mute);font-size:11px;">※合計外</small>' : ''}</span>
      <span class="${r.val > 0 ? 'breakdown-val' : 'breakdown-zero'}">${r.val}個</span>
    </div>
  `).join('');

  document.getElementById('breakdown-modal').classList.add('show');
}

function closeBreakdown() {
  document.getElementById('breakdown-modal').classList.remove('show');
}

init();
</script>

      <div style="font-size:15px;font-weight:700;color:#1A3C5E;">全ドライバー残数内訳</div>
      <button onclick="closeAllBreakdown()" style="border:none;background:none;font-size:22px;cursor:pointer;">×</button>
    </div>
    <div id="all-breakdown-list"></div>
  </div>
</div>
