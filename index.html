<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望提出</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh}
.header{background:#06C755;color:#fff;padding:16px;text-align:center;font-size:18px;font-weight:bold}
.container{padding:16px;max-width:480px;margin:0 auto}
.name-box{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:15px;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.name-box span{font-weight:bold;color:#06C755}
.section-title{font-size:14px;color:#666;margin-bottom:10px;font-weight:bold}
.date-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.date-btn{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 16px;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%}
.date-btn.selected{border-color:#06C755;background:#f0fff4}
.check{width:24px;height:24px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.date-btn.selected .check{background:#06C755;border-color:#06C755;color:#fff}
.submit-btn{width:100%;background:#06C755;color:#fff;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:bold;cursor:pointer}
.submit-btn:disabled{background:#ccc}
.loading{text-align:center;padding:60px 16px;color:#999;font-size:15px}
.error{background:#fff0f0;border:1px solid #ffcccc;border-radius:12px;padding:16px;color:#c00;font-size:14px;margin-bottom:16px}
.success{text-align:center;padding:40px 16px}
.success .icon{font-size:60px;margin-bottom:16px}
.success h2{font-size:20px;color:#333;margin-bottom:8px}
.success p{color:#666;font-size:14px}
</style>
</head>
<body>
<div class="header">シフト希望提出</div>
<div class="container">
<div id="app"><div class="loading">読み込み中...</div></div>
</div>
<script>
var GAS='https://script.google.com/macros/s/AKfycby2w7DLb-HULShiC5rKhD_wKg_TGjpx5nURr4Mk-E4Mzg_koC7eJbBedQ6u5QfwsJ_T4Q/exec';
var LID='2009637457-ECOGmo94';
var uid='';
var sel=[];

function err(m){document.getElementById('app').innerHTML='<div class="error">'+m+'</div>';}

function render(dates,name){
  var h='<div class="name-box">こんにちは、<span>'+name+'</span> さん</div>';
  h+='<div class="section-title">出勤できる日を選んでください</div>';
  h+='<div class="date-list">';
  for(var i=0;i<dates.length;i++){
    h+='<button class="date-btn" onclick="tog(this,\''+dates[i]+'\')"><div class="check">✓</div><span>'+dates[i]+'</span></button>';
  }
  h+='</div><button class="submit-btn" onclick="sub()">送信する</button>';
  document.getElementById('app').innerHTML=h;
}

function tog(btn,d){
  btn.classList.toggle('selected');
  var i=sel.indexOf(d);
  if(i>-1){sel.splice(i,1);}else{sel.push(d);}
}

function sub(){
  var btn=document.querySelector('.submit-btn');
  btn.disabled=true;btn.textContent='送信中...';
  var url=GAS+'?action=submit&userId='+encodeURIComponent(uid)+'&dates='+encodeURIComponent(sel.join(','));
  fetch(url).then(function(r){return r.json();}).then(function(d){
    if(d.status==='ok'){
      document.getElementById('app').innerHTML='<div class="success"><div class="icon">✅</div><h2>送信完了しました！</h2><p>お疲れ様です。シフトが確定したらLINEでお知らせします。</p></div>';
    }else{err(d.message||'エラーが発生しました');}
  }).catch(function(e){btn.disabled=false;btn.textContent='送信する';err('送信失敗: '+e.message);});
}

liff.init({liffId:LID}).then(function(){
  if(!liff.isLoggedIn()){liff.login();return;}
  return liff.getProfile();
}).then(function(p){
  if(!p)return;
  uid=p.userId;
  return fetch(GAS).then(function(r){return r.json();}).then(function(d){render(d.dates,p.displayName);});
}).catch(function(e){err('エラー: '+e.message);});
</script>
</body>
</html>
