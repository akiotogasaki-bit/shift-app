<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト希望提出</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .header { background: #06C755; color: white; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; }
    .container { padding: 16px; max-width: 480px; margin: 0 auto; }
    .name-box { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; font-size: 15px; color: #333; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .name-box span { font-weight: bold; color: #06C755; }
    .section-title { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: bold; }
    .date-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .date-btn { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 14px 16px; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .date-btn.selected { border-color: #06C755; background: #f0fff4; }
    .date-btn .check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; transition: all 0.15s; }
    .date-btn.selected .check { background: #06C755; border-color: #06C755; color: white; }
    .submit-btn { width: 100%; background: #06C755; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 17px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(6,199,85,0.3); }
    .submit-btn:disabled { background: #ccc; box-shadow: none; }
    .loading { text-align: center; padding: 60px 16px; color: #999; font-size: 15px; }
    .error { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 12px; padding: 16px; color: #cc0000; font-size: 14px; margin-bottom: 16px; }
    .success { text-align: center; padding: 40px 16px; }
    .success .icon { font-size: 60px; margin-bottom: 16px; }
    .success h2 { font-size: 20px; color: #333; margin-bottom: 8px; }
    .success p { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">シフト希望提出</div>
  <div class="container">
    <div id="app"><div class="loading">読み込み中...</div></div>
  </div>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby2w7DLb-HULShiC5rKhD_wKg_TGjpx5nURr4Mk-E4Mzg_koC7eJbBedQ6u5QfwsJ_T4Q/exec';
    const LIFF_ID = '2009637457-ECOGmo94';
    let userId = '';
    let selectedDates = [];

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        userId = profile.userId;
        const res = await fetch(GAS_URL);
        const data = await res.json();
        renderForm(data.dates, profile.displayName);
      } catch(e) {
        document.getElementById('app').innerHTML = '<div class="error">エラーが発生しました。<br>' + e.message + '</div>';
      }
    }

    function renderForm(dates, name) {
      document.getElementById('app').innerHTML = `
        <div class="name-box">こんにちは、<span>${name}</span> さん</div>
        <div class="section-title">出勤できる日を選んでください</div>
        <div class="date-list">
          ${dates.map(d => `<button class="date-btn" onclick="toggleDate(this,'${d}')"><div class="check">✓</div><span>${d}</span></button>`).join('')}
        </div>
        <button class="submit-btn" onclick="submit()">送信する</button>`;
    }

    function toggleDate(btn, date) {
      btn.classList.toggle('selected');
      selectedDates.includes(date) ? selectedDates = selectedDates.filter(d => d !== date) : selectedDates.push(date);
    }

    async function submit() {
  const btn = document.querySelector('.submit-btn');
  btn.disabled = true; btn.textContent = '送信中...';
  try {
    const params = new URLSearchParams({
      action: 'submit',
      userId: userId,
      dates: selectedDates.join(',')
    });
    const res = await fetch(GAS_URL + '?' + params.toString());
    const data = await res.json();
    if (data.status === 'ok') {
      document.getElementById('app').innerHTML = `<div class="success"><div class="icon">✅</div><h2>送信完了しました！</h2><p>お疲れ様です。<br>シフトが確定したらLINEでお知らせします。</p></div>`;
    } else {
      document.getElementById('app').innerHTML = '<div class="error">' + (data.message || 'エラーが発生しました') + '</div>';
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = '送信する';
    alert('エラー: ' + e.message);
  }
}
const data = await res.json();
        const data = await res.json();
        if (data.status === 'ok') {
          document.getElementById('app').innerHTML = `<div class="success"><div class="icon">✅</div><h2>送信完了しました！</h2><p>お疲れ様です。<br>シフトが確定したらLINEでお知らせします。</p></div>`;
        } else {
          document.getElementById('app').innerHTML = '<div class="error">' + (data.message || 'エラーが発生しました') + '</div>';
        }
      } catch(e) {
        btn.disabled = false; btn.textContent = '送信する';
        alert('送信に失敗しました。再度お試しください。');
      }
    }
    init();
  </script>
</body>
</html>
