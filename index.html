<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望提出</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;min-height:100vh}
.header{background:#06C755;color:#fff;padding:16px;text-align:center;font-size:18px;font-weight:bold}
.container{padding:16px;max-width:480px;margin:0 auto}
.name-box{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:15px;color:#333}
.name-box span{font-weight:bold;color:#06C755}
.section-title{font-size:14px;color:#666;margin-bottom:10px;font-weight:bold}
.date-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.date-btn{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 16px;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%}
.date-btn.selected{border-color:#06C755;background:#f0fff4}
.check{width:24px;height:24px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.date-btn.selected .check{background:#06C755;border-color:#06C755;color:#fff}
.submit-btn{width:100%;background:#06C755;color:#fff;border:none;border-radius:12px;padding:16px;font-size:17px;font-weight:bold;cursor:pointer;margin-top:8px}
.submit-btn:disabled{background:#ccc}
.loading{text-align:center;padding:60px 16px;color:#999;font-size:15px}
.error{background:#fff0f0;border:1px solid #ffcccc;border-radius:12px;padding:16px;color:#c00;font-size:14px;margin-bottom:16px}
.success{text-align:center;padding:40px 16px}
.success .icon{font-size:60px;margin-bottom:16px}
.success h2{font-size:20px;color:#333;margin-bottom:8px}
.success p{color:#666;font-size:14px}
.reg-box{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px}
.reg-box p{font-size:14px;color:#333;margin-bottom:12px;line-height:1.6}
.reg-box input{width:100%;border:2px solid #e0e0e0;border-radius:8px;padding:12px;font-size:16px;margin-bottom:12px}
</style>
</head>
<body>
<div class="header">シフト希望提出</div>
<div class="container"><div id="app"><div class="loading">読み込み中...</div></div></div>
<script>
var G='https://script.google.com/macros/s/AKfycby2w7DLb-HULShiC5rKhD_wKg_TGjpx5nURr4Mk-E4Mzg_koC7eJbBedQ6u5QfwsJ_T4Q/exec';
var L='2009637457-ECOGmo94';
var myUid='';
var sel=[];

function dbg(s){document.getElementById('app').innerHTML='<div class="error" style="font-size:12px">'+s+'</div>';}
function er(m){document.getElementById('app').innerHTML='<div class="error">'+m+'</div>';}

function showReg(){
  document.getElementById('app').innerHTML='<div class="reg-box"><p>初回登録が必要です。氏名を入力してください。</p><input type="text" id="ni" placeholder="例：山田 太郎"><button class="submit-btn" id="regBtn">登録する</button></div>';
  document.getElementById('regBtn').addEventListener('click', function(){
    var n=document.getElementById('ni').value.trim();
    if(!n){alert('氏名を入力してください');return;}
    var b=document.getElementById('regBtn');
    b.disabled=true;b.textContent='登録中...';
    fetch(G+'?action=register&userId='+encodeURIComponent(myUid)+'&name='+encodeURIComponent(n))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.status==='ok'){load(n);}
        else{er(d.message||'登録失敗');}
      })
      .catch(function(e){er('登録失敗: '+e.message);});
  });
}

function load(name){
  fetch(G)
    .then(function(r){return r.json();})
    .then(function(d){rend(d.dates,name);})
    .catch(function(e){er('失敗: '+e.message);});
}

function rend(dates,name){
  var h='<div class="name-box">こんにちは、<span>'+name+'</span> さん</div>';
  h+='<div class="section-title">出勤できる日を選んでください</div>';
  h+='<div class="date-list">';
  for(var i=0;i<dates.length;i++){
    h+='<button class="date-btn" data-date="'+dates[i]+'"><div class="check">&#10003;</div><span>'+dates[i]+'</span></button>';
  }
  h+='</div><button class="submit-btn" id="subBtn">送信する</button>';
  document.getElementById('app').innerHTML=h;
  document.querySelectorAll('.date-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      btn.classList.toggle('selected');
      var d=btn.getAttribute('data-date');
      var i=sel.indexOf(d);
      if(i>-1){sel.splice(i,1);}else{sel.push(d);}
    });
  });
  document.getElementById('subBtn').addEventListener('click',function(){
    var b=document.getElementById('subBtn');
    b.disabled=true;b.textContent='送信中...';
    fetch(G+'?action=submit&userId='+encodeURIComponent(myUid)+'&dates='+encodeURIComponent(sel.join(',')))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.status==='ok'){
          document.getElementById('app').innerHTML='<div class="success"><div class="icon">&#x2705;</div><h2>送信完了しました！</h2><p>お疲れ様です。シフトが確定したらLINEでお知らせします。</p></div>';
        }else if(d.message&&d.message.indexOf('見つかりません')>-1){
          showReg();
        }else{er(d.message||'エラー');}
      })
      .catch(function(e){b.disabled=false;b.textContent='送信する';er('失敗: '+e.message);});
  });
}

dbg('STEP1: liff.init開始...');
liff.init({liffId:L})
  .then(function(){
    dbg('STEP2: init完了 loggedIn='+liff.isLoggedIn());
    if(!liff.isLoggedIn()){liff.login();return;}
    return liff.getProfile();
  })
  .then(function(p){
    if(!p){dbg('STEP3: profileなし');return;}
    dbg('STEP3: '+p.displayName+' uid='+p.userId.substring(0,8)+'...');
    myUid=p.userId;
    return fetch(G+'?action=check&userId='+encodeURIComponent(myUid))
      .then(function(r){return r.json();})
      .then(function(d){
        dbg('STEP4: check='+JSON.stringify(d));
        setTimeout(function(){
          if(d.status==='ok'){load(d.name);}
          else{showReg();}
        },1000);
      });
  })
  .catch(function(e){er('エラー: '+e.message+' code:'+e.code);});
</script>
</body>
</html>
